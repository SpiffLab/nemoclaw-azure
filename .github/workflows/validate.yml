name: Validate Bicep

on:
  push:
    branches: [main]
    paths: ['infra/**']
  pull_request:
    branches: [main]
    paths: ['infra/**']

jobs:
  validate:
    name: Lint & Build Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI - Bicep Build
        uses: azure/cli@v2
        with:
          inlineScript: |
            az bicep build --file infra/main.bicep

      - name: Azure CLI - Bicep Lint
        uses: azure/cli@v2
        with:
          inlineScript: |
            az bicep lint --file infra/main.bicep
